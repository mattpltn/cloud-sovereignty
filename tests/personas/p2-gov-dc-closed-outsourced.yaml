# Golden persona P2 — DRAFT, awaiting project-owner review.
# See P1 for the persona ownership workflow note.
#
# Design intent: this is the critical "facility sovereignty is not enough"
# test case. The government still owns the datacenter (A1, same as P1) but
# runs a closed proprietary stack and has outsourced operations to a foreign
# vendor. This persona MUST NOT score as uniformly sovereign just because the
# facility is domestic — technology and operations layers should show real
# gaps. If the engine ever scores P2 close to P1, that is a bug in the
# responsibility-map/disposition logic, not a feature.

persona_id: gov-dc-closed-outsourced
name: "P2 — Government datacenter, closed stack, foreign-outsourced ops"
summary: >
  A1 (government-owned datacenter, government cloud) but on a closed
  proprietary ecosystem (Axis B), with day-to-day operations outsourced to
  a foreign systems integrator. Facility-sovereign but technology- and
  ops-constrained — must NOT score as sovereign across the board.
status: draft

# Same outcome ranking as P1 is deliberately avoided: this persona still
# ranks continuity and foreign-legal-access protection highly (it's the
# same government), which is exactly what should expose the gap between
# stated priorities and what a closed/outsourced posture can actually
# deliver.
priorities:
  - protection_from_foreign_legal_access
  - continuity_under_disconnection
  - lock_in_avoidance
  - local_capacity_building
  - cost_efficiency

classification_scheme: default_4_tier

tiers:
  - tier_id: secret   # same tier as P1 so the two are directly comparable
    axis_a: A1
    axis_b: closed_proprietary   # e.g. Huawei/VMware/Nutanix-style closed ecosystem
    modifiers:
      ops_outsourced:
        outsourced: true
        to_whom: "Foreign systems integrator (vendor's managed-services arm)"
        jurisdiction: "foreign, non-{TRUSTED_REGION}"
      service_model: IaaS
      provider_jurisdiction: "{NATION}"       # the datacenter itself is government-owned
      facility_jurisdiction: "{NATION}"        # facility remains domestic — the "sovereign" part
      # Outsourced ops staff and the closed vendor's support channel create a
      # credible extraterritorial exposure path even though the facility and
      # nominal ownership are domestic — this is the crux of the test case.
      extraterritorial_law_exposure: true
      key_custody: provider_held   # closed-stack vendor tooling manages keys by default
      contract_terms:
        audit_rights: false
        exit_reversibility: false   # closed proprietary stack — classic lock-in
        residency_commitment: true
        escrow: false
